function quitarBienvenida() {
  var b = document.getElementById("bienvenida");

// ── RENDERIZAR MARKDOWN + KATEX ──
function renderizar(texto) {
  var bloques = [];
  var n = 0;
  texto = texto.replace(/\$\$([\s\S]+?)\$\$/g, function(_, eq) {
    var ph = "BLKEQ" + n + "END";
    try { bloques.push({ph: ph, html: katex.renderToString(eq.trim(), {displayMode: true, throwOnError: false})}); }
    catch(e) { bloques.push({ph: ph, html: "<code>" + eq + "</code>"}); }
    n++; return ph;
  });
  texto = texto.replace(/\$([^\$\n]+?)\$/g, function(_, eq) {
    var ph = "INLEQ" + n + "END";
    try { bloques.push({ph: ph, html: katex.renderToString(eq.trim(), {displayMode: false, throwOnError: false})}); }
    catch(e) { bloques.push({ph: ph, html: "<code>" + eq + "</code>"}); }
    n++; return ph;
  });
  var html = marked.parse(texto);
  for (var i = 0; i < bloques.length; i++) { html = html.replace(bloques[i].ph, bloques[i].html); }
  return html;
}

// ── AGREGAR MENSAJE USUARIO ──
function agregarUsuario(texto, imgSrc) {
  quitarBienvenida();
  var grupo = document.createElement("div");

  var burbuja = document.createElement("div");

  if (imgSrc) {
    var img = document.createElement("img");
    img.className = "msg-img-adjunta";
    img.src = imgSrc;
    burbuja.appendChild(img);
  }
  if (texto) {
    var p = document.createElement("p");
    p.textContent = texto;
    burbuja.appendChild(p);
  }
  grupo.appendChild(burbuja);
  elMensajes.appendChild(grupo);
  scrollAbajo();
}

  grupo.className = "msg-grupo ia";
  var etiqueta = document.createElement("div");
  etiqueta.className = "msg-modelo";
  etiqueta.textContent = modeloNombre;
  var burbuja = document.createElement("div");
  burbuja.className = "msg-burbuja";
  burbuja.innerHTML = html;
  grupo.appendChild(etiqueta);
  grupo.appendChild(burbuja);
  elMensajes.appendChild(grupo);
  scrollAbajo();
  return burbuja;
}

// ── AGREGAR ERROR ──
function agregarError(msg) {
  quitarBienvenida();
  var grupo = document.createElement("div");
  grupo.className = "msg-grupo error";
  var burbuja = document.createElement("div");
  burbuja.className = "msg-burbuja";
  burbuja.textContent = msg;
  grupo.appendChild(burbuja);
  elMensajes.appendChild(grupo);
  scrollAbajo();
}

// ── INDICADOR ESCRIBIENDO ──
function mostrarEscribiendo() {
  quitarBienvenida();
  var grupo = document.createElement("div");
  grupo.className = "msg-grupo ia";
  var inner = document.createElement("div");
  inner.className = "escribiendo";
  inner.innerHTML = "<span></span><span></span><span></span>";
  grupo.appendChild(inner);
  elMensajes.appendChild(grupo);
  scrollAbajo();
  return grupo;
}

// ── GENERAR IMAGEN ──
function esGenerarImagen(t) {
  t = t.toLowerCase();
  var verbos = ["genera", "generar", "crea", "crear", "dibuja", "dibujar", "pinta", "pintar", "haz una imagen", "hazme una imagen", "ilustra", "diseña una imagen", "diseña un"];
  var objetos = ["imagen", "foto", "fotografía", "fotografia", "ilustración", "ilustracion", "dibujo", "pintura", "retrato", "paisaje"];
  for (var i = 0; i < verbos.length; i++) {
    if (t.indexOf(verbos[i]) !== -1) {
      for (var j = 0; j < objetos.length; j++) {
        if (t.indexOf(objetos[j]) !== -1) return true;
      }
    }
  }
  return false;
}

function generarImagen(prompt, modeloNombre) {
  var url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt) + "?width=768&height=768&nologo=true";
  var grupo = document.createElement("div");
  grupo.className = "msg-grupo ia";
  var etiqueta = document.createElement("div");
  etiqueta.className = "msg-modelo";
  etiqueta.textContent = "Imagen generada";
  var burbuja = document.createElement("div");
  burbuja.className = "msg-burbuja";
  burbuja.style.background = "transparent";
  burbuja.style.padding = "0";
  var img = document.createElement("img");
  img.className = "msg-img-generada";
  img.alt = "Imagen generada";
  var btnDesc = document.createElement("a");
  btnDesc.className = "btn-descargar";
  btnDesc.textContent = "Descargar imagen";
  btnDesc.download = "ochoenes-imagen.jpg";
  img.onload = function() {
    btnDesc.href = url;
    scrollAbajo();
  };
  img.src = url;
  burbuja.appendChild(img);
  burbuja.appendChild(btnDesc);
  grupo.appendChild(etiqueta);
  grupo.appendChild(burbuja);
  elMensajes.appendChild(grupo);
  scrollAbajo();
}

// ── ADJUNTAR IMAGEN ──
elBtnAdjuntar.addEventListener("click", function() { elFileInput.click(); });

elFileInput.addEventListener("change", function() {
  var file = elFileInput.files[0];
  if (!file) return;
  imgTipo = file.type || "image/jpeg";
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    imgBase64 = dataUrl.split(",")[1];
    elPreviewThumb.src = dataUrl;
    elPreviewArea.style.display = "block";
    elPreviewArea.style.display = "-webkit-box";
    elPreviewArea.style.display = "flex";
    actualizarBoton();
  };
  reader.readAsDataURL(file);
});

function quitarImagen() {
  imgBase64 = null; imgTipo = null;
  elPreviewThumb.src = "";
  elPreviewArea.style.display = "none";
  elFileInput.value = "";
}
elBtnQuitarPreview.addEventListener("click", quitarImagen);

// ── BOTON ENVIAR ──
function actualizarBoton() {
  var hayTexto = elTexto.value.trim().length > 0;
  var hayImagen = imgBase64 !== null;
  elBtnEnviar.disabled = (!hayTexto && !hayImagen) || enviando;
}

elTexto.addEventListener("input", function() {
  this.style.height = "36px";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
  actualizarBoton();
});

// ── NOMBRE DEL MODELO ──
function nombreModelo() {
  var val = elModelSelect.value;
  if (val.indexOf("gemini") !== -1) return "Gemini 2.0 Flash";
  if (val.indexOf("llama") !== -1) return "Llama 3.3 70B";
  if (val.indexOf("phi") !== -1) return "Phi-4 Multimodal";
  return "IA";
}

// ── ENVIAR ──
function enviar() {
  if (enviando) return;
  var msg = elTexto.value.trim();
  if (!msg && !imgBase64) return;

  enviando = true;
  elBtnEnviar.disabled = true;

  var msgTexto = msg;
  var imgSrc = imgBase64 ? elPreviewThumb.src : null;
  var imgB64 = imgBase64;
  var imgT = imgTipo;
  var modeloActual = elModelSelect.value;
  var modeloNombre = nombreModelo();

  elTexto.value = "";
  elTexto.style.height = "36px";
  quitarImagen();

  agregarUsuario(msgTexto, imgSrc);

  // Generar imagen localmente
  if (!imgB64 && esGenerarImagen(msgTexto)) {
    generarImagen(msgTexto, modeloNombre);
    historial.push({role: "user", content: msgTexto});
    historial.push({role: "assistant", content: "[Imagen generada]"});
    enviando = false;
    actualizarBoton();
    return;
  }

  var indicador = mostrarEscribiendo();

  var payload = {
    mensaje: msgTexto,
    historial: historial,
    modelo: modeloActual
  };
  if (imgB64) { payload.imagen = imgB64; payload.imagen_tipo = imgT; }

  var xhr = new XMLHttpRequest();
  xhr.open("POST", SERVIDOR + "/chat", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.timeout = 60000;

  xhr.onload = function() {
    if (indicador.parentNode) indicador.parentNode.removeChild(indicador);
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        var html = renderizar(data.respuesta);
        agregarIA(html, modeloNombre);
        // Actualizar historial
        historial.push({role: "user", content: msgTexto});
        historial.push({role: "assistant", content: data.respuesta});
      } catch(e) {
        agregarError("Error procesando la respuesta.");
      }
    } else {
      try {
        var err = JSON.parse(xhr.responseText);
        agregarError(err.error || "Error del servidor.");
      } catch(e2) {
        agregarError("Error del servidor (" + xhr.status + ").");
      }
    }
    enviando = false;
    actualizarBoton();
  };

  xhr.onerror = function() {
    if (indicador.parentNode) indicador.parentNode.removeChild(indicador);
    agregarError("No se pudo conectar con el servidor.");
    enviando = false; actualizarBoton();
  };

  xhr.ontimeout = function() {
    if (indicador.parentNode) indicador.parentNode.removeChild(indicador);
    agregarError("Tiempo agotado. Inténtalo de nuevo.");
    enviando = false; actualizarBoton();
  };

  xhr.send(JSON.stringify(payload));
}

elBtnEnviar.addEventListener("click", enviar);

elTexto.addEventListener("keydown", function(e) {
  if (e.keyCode === 13 && !e.shiftKey) { e.preventDefault(); enviar(); }
});
</script>
