// ── RENDERIZAR MARKDOWN + KATEX ──
function renderizar(texto) {
  var bloques = [], n = 0;
  texto = texto.replace(/\$\$([\s\S]+?)\$\$/g, function(_, eq) {
    var ph = "BLKEQ" + n + "END";
    try { bloques.push({ph:ph, html:katex.renderToString(eq.trim(), {displayMode:true, throwOnError:false})}); }
    catch(e) { bloques.push({ph:ph, html:"<code>"+eq+"</code>"}); }
    n++; return ph;
  });
  texto = texto.replace(/\$([^\$\n]+?)\$/g, function(_, eq) {
    var ph = "INLEQ" + n + "END";
    try { bloques.push({ph:ph, html:katex.renderToString(eq.trim(), {displayMode:false, throwOnError:false})}); }
    catch(e) { bloques.push({ph:ph, html:"<code>"+eq+"</code>"}); }
    n++; return ph;
  });
  var html = marked.parse(texto);
  for (var i = 0; i < bloques.length; i++) { html = html.replace(bloques[i].ph, bloques[i].html); }
  return html;
}

// ── NOMBRE MODELO ──
function nombreModelo(val) {
  if (!val) val = elModelSelect.value;
  if (val.indexOf("gpt-oss-120b") !== -1) return "GPT OSS 120B";
  if (val.indexOf("qwen3-next") !== -1) return "Qwen3 80B";
  if (val.indexOf("hermes") !== -1) return "Hermes 3 405B";
  if (val.indexOf("venice") !== -1 || val.indexOf("dolphin") !== -1) return "Venice Uncensored";
  if (val.indexOf("nemotron") !== -1) return "Nemotron Omni";
  return "IA";
}

// ── ICONO ARCHIVO ──
function iconoArchivo(tipo) {
  if (tipo.indexOf("pdf") !== -1) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/></svg>';
  }
  if (tipo.indexOf("audio") !== -1) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
  }
  if (tipo.indexOf("word") !== -1 || tipo.indexOf("doc") !== -1) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="#2980b9" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
  }
  return '<svg viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
}

function etiquetaTipo(tipo, nombre) {
  if (tipo.startsWith("image/")) return "Imagen";
  if (tipo.startsWith("audio/")) return "Audio";
  if (tipo.indexOf("pdf") !== -1) return "PDF";
  if (tipo.indexOf("word") !== -1 || tipo.indexOf("doc") !== -1) return "Word";
  if (tipo === "text/plain") return "Texto";
  if (tipo === "text/csv") return "CSV";
  var ext = nombre.split(".").pop().toUpperCase();
  return ext || "Archivo";
}

// ── ADJUNTAR ARCHIVO ──
elBtnAdjuntar.addEventListener("click", function() { elFileInput.click(); });

elFileInput.addEventListener("change", function() {
  var file = elFileInput.files[0];
  if (!file) return;
  archivoTipo = file.type || "application/octet-stream";
  archivoNombre = file.name;

  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    archivoB64 = dataUrl.split(",")[1];

    // Mostrar preview
    elPreviewVisual.innerHTML = "";
    if (archivoTipo.startsWith("image/")) {
      var img = document.createElement("img");
      img.src = dataUrl;
      elPreviewVisual.appendChild(img);
    } else {
      elPreviewVisual.innerHTML = iconoArchivo(archivoTipo);
    }

    elPreviewNombre.textContent = archivoNombre;
    elPreviewTipo.textContent = etiquetaTipo(archivoTipo, archivoNombre);
    elPreviewArea.style.display = "block";
    elOmniBadge.className = "visible";
    actualizarBoton();
  };
  reader.readAsDataURL(file);
});

function quitarArchivo() {
  archivoB64 = null; archivoTipo = null; archivoNombre = null;
  elPreviewArea.style.display = "none";
  elPreviewVisual.innerHTML = "";
  elFileInput.value = "";
  elOmniBadge.className = "";
}
elBtnQuitarPreview.addEventListener("click", quitarArchivo);

// ── BOTON ENVIAR ──
function actualizarBoton() {
  var hayTexto = elTexto.value.trim().length > 0;
  var hayArchivo = archivoB64 !== null;
  elBtnEnviar.disabled = (!hayTexto && !hayArchivo) || enviando;
}

elTexto.addEventListener("input", function() {
  this.style.height = "36px";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
  actualizarBoton();
});

// ── DETECCIÓN GENERAR IMAGEN ──
function esGenerarImagen(t) {
  t = t.toLowerCase();
  var verbos = ["genera", "generar", "crea", "crear", "dibuja", "dibujar", "pinta", "pintar", "haz una imagen", "hazme una imagen", "ilustra", "diseña una imagen"];
  var objetos = ["imagen", "foto", "fotografía", "fotografia", "ilustración", "ilustracion", "dibujo", "pintura", "retrato", "paisaje"];
  for (var i = 0; i < verbos.length; i++) {
    if (t.indexOf(verbos[i]) !== -1) {
      for (var j = 0; j < objetos.length; j++) {
        if (t.indexOf(objetos[j]) !== -1) return true;
      }
    }
  }
  return false;
}

function generarImagen(prompt) {
  var url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt) + "?width=768&height=768&nologo=true";
  var grupo = document.createElement("div");
  grupo.className = "msg-grupo ia";
  var etiq = document.createElement("div");
  etiq.className = "msg-modelo";
  etiq.textContent = "Imagen generada";
  var burbuja = document.createElement("div");
  burbuja.className = "msg-burbuja";
  burbuja.style.background = "transparent";
  burbuja.style.padding = "0";
  var img = document.createElement("img");
  img.className = "msg-img-generada";
  img.alt = "Imagen generada";
  var a = document.createElement("a");
  a.className = "btn-descargar";
  a.textContent = "Descargar imagen";
  a.download = "ochoenes-imagen.jpg";
  img.onload = function() { a.href = url; scrollAbajo(); };
  img.src = url;
  burbuja.appendChild(img);
  burbuja.appendChild(a);
  grupo.appendChild(etiq);
  grupo.appendChild(burbuja);
  elMensajes.appendChild(grupo);
  scrollAbajo();
}

// ── AGREGAR MENSAJES ──
function agregarUsuario(texto, archivo) {
  quitarBienvenida();
  var grupo = document.createElement("div");
  grupo.className = "msg-grupo usuario";
  var burbuja = document.createElement("div");
  burbuja.className = "msg-burbuja";

  if (archivo) {
    if (archivo.tipo.startsWith("image/")) {
      var img = document.createElement("img");
      img.className = "msg-img-adjunta";
      img.src = archivo.src;
      burbuja.appendChild(img);
    } else {
      var badge = document.createElement("div");
      badge.className = "msg-archivo-badge";
      var icono = document.createElement("div");
      icono.className = "msg-archivo-icono";
      icono.innerHTML = iconoArchivo(archivo.tipo);
      var nombre = document.createElement("span");
      nombre.className = "msg-archivo-nombre";
      nombre.textContent = archivo.nombre;
      badge.appendChild(icono);
      badge.appendChild(nombre);
      burbuja.appendChild(badge);
    }
  }

  if (texto) {
    var p = document.createElement("p");
    p.textContent = texto;
    burbuja.appendChild(p);
  }

  grupo.appendChild(burbuja);
  elMensajes.appendChild(grupo);
  scrollAbajo();
}

function agregarIA(html, modelo) {
  quitarBienvenida();
  var grupo = document.createElement("div");
  grupo.className = "msg-grupo ia";
  var etiq = document.createElement("div");
  etiq.className = "msg-modelo";
  etiq.textContent = modelo;
  var burbuja = document.createElement("div");
  burbuja.className = "msg-burbuja";
  burbuja.innerHTML = html;
  grupo.appendChild(etiq);
  grupo.appendChild(burbuja);
  elMensajes.appendChild(grupo);
  scrollAbajo();
}

function agregarError(msg) {
  quitarBienvenida();
  var grupo = document.createElement("div");
  grupo.className = "msg-grupo error";
  var burbuja = document.createElement("div");
  burbuja.className = "msg-burbuja";
  burbuja.textContent = msg;
  grupo.appendChild(burbuja);
  elMensajes.appendChild(grupo);
  scrollAbajo();
}

function mostrarEscribiendo() {
  quitarBienvenida();
  var grupo = document.createElement("div");
  grupo.className = "msg-grupo ia";
  var inner = document.createElement("div");
  inner.className = "escribiendo";
  inner.innerHTML = "<span></span><span></span><span></span>";
  grupo.appendChild(inner);
  elMensajes.appendChild(grupo);
  scrollAbajo();
  return grupo;
}

// ── ENVIAR ──
function enviar() {
  if (enviando) return;
  var msg = elTexto.value.trim();
  if (!msg && !archivoB64) return;

  enviando = true;
  elBtnEnviar.disabled = true;

  var msgTexto = msg;
  var archivoInfo = archivoB64 ? {
    b64: archivoB64,
    tipo: archivoTipo,
    nombre: archivoNombre,
    src: archivoTipo.startsWith("image/") ? ("data:" + archivoTipo + ";base64," + archivoB64) : null
  } : null;

  var modeloActual = elModelSelect.value;
  var modeloNombre = nombreModelo(modeloActual);

  elTexto.value = "";
  elTexto.style.height = "36px";
  quitarArchivo();
  actualizarBoton();

  agregarUsuario(msgTexto, archivoInfo);

  // Generar imagen
  if (!archivoInfo && esGenerarImagen(msgTexto)) {
    generarImagen(msgTexto);
    historial.push({role:"user", content:msgTexto});
    historial.push({role:"assistant", content:"[Imagen generada]"});
    enviando = false;
    actualizarBoton();
    return;
  }

  var indicador = mostrarEscribiendo();

  var payload = {
    mensaje: msgTexto,
    historial: historial,
    modelo: modeloActual
  };
  if (archivoInfo) {
    payload.archivo = archivoInfo.b64;
    payload.archivo_tipo = archivoInfo.tipo;
    payload.archivo_nombre = archivoInfo.nombre;
  }

  var xhr = new XMLHttpRequest();
  xhr.open("POST", SERVIDOR + "/chat", true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.timeout = 60000;

  xhr.onload = function() {
    if (indicador.parentNode) indicador.parentNode.removeChild(indicador);
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        var modeloUsado = archivoInfo ? "Nemotron Omni" : modeloNombre;
        agregarIA(renderizar(data.respuesta), modeloUsado);
        historial.push({role:"user", content: msgTexto || ("[Archivo: " + (archivoInfo ? archivoInfo.nombre : "") + "]")});
        historial.push({role:"assistant", content: data.respuesta});
      } catch(e) {
        agregarError("Error procesando la respuesta.");
      }
    } else {
      try {
        var err = JSON.parse(xhr.responseText);
        agregarError(err.error || "Error del servidor.");
      } catch(e2) {
        agregarError("Error del servidor (" + xhr.status + ").");
      }
    }
    enviando = false;
    actualizarBoton();
  };

  xhr.onerror = function() {
    if (indicador.parentNode) indicador.parentNode.removeChild(indicador);
    agregarError("No se pudo conectar con el servidor.");
    enviando = false; actualizarBoton();
  };

  xhr.ontimeout = function() {
    if (indicador.parentNode) indicador.parentNode.removeChild(indicador);
    agregarError("Tiempo agotado. Inténtalo de nuevo.");
    enviando = false; actualizarBoton();
  };

  xhr.send(JSON.stringify(payload));
}

elBtnEnviar.addEventListener("click", enviar);
elTexto.addEventListener("keydown", function(e) {
  if (e.keyCode === 13 && !e.shiftKey) { e.preventDefault(); enviar(); }
});
</script>
